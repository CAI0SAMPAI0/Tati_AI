<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati AI — Login</title>

    <meta name="google-client-id" content="237918390149-balpj4nkb7frb0ujojnhkqcs930anh1i.apps.googleusercontent.com">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">

    <style>
        .google-btn-container {
            position: relative;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn-google {
            width: 100%;
            padding: 0.7rem;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.2s;
            pointer-events: none;
        }

        /* Botão nativo do GSI sobreposto — invisível mas clicável */
        #google-btn-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 9px;
            opacity: 0.001;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #google-btn-wrap>div,
        #google-btn-wrap iframe {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

    <div class="login-page">
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">☀️</span>
        </button>

        <!-- ── Lado esquerdo ── -->
        <div class="login-left">
            <div class="login-left-content">
                <img src="images/tati_logo.jpg" alt="Teacher Tati" class="login-avatar"
                    onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
                <div id="avatar-fallback" class="login-avatar-fallback" style="display:none;">🧑‍🏫</div>
                <h1>Teacher Tati</h1>
                <p>Sua professora de inglês com inteligência artificial. Pratique quando quiser, no seu ritmo.</p>
                <div class="login-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- ── Lado direito ── -->
        <div class="login-right">
            <div class="login-form-wrap">

                <h2>Bem-vindo</h2>
                <p class="subtitle">Entre na sua conta ou crie uma nova</p>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Entrar</button>
                    <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Criar Conta</button>
                </div>

                <div class="error-msg" id="error-msg"></div>
                <div class="success-msg" id="success-msg"></div>

                <!-- Botão Google: visual decorativo + nativo GSI sobreposto -->
                <div class="google-btn-container">
                    <button class="btn-google" tabindex="-1" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Continuar com Google
                    </button>
                    <div id="google-btn-wrap"></div>
                </div>

                <div class="divider">ou</div>

                <!-- Form Login -->
                <form id="form-login" onsubmit="handleLogin(event)">
                    <div class="field">
                        <label>Username ou E-mail</label>
                        <input id="login-username" type="text" placeholder="usuario ou email@exemplo.com"
                            autocomplete="username">
                    </div>
                    <div class="field">
                        <label>Senha</label>
                        <input id="login-password" type="password" placeholder="••••••••"
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
                </form>

                <!-- Form Cadastro -->
                <form id="form-register" style="display:none;" onsubmit="handleRegister(event)">
                    <div class="field">
                        <label>Nome completo</label>
                        <input id="reg-name" type="text" placeholder="João Silva">
                    </div>
                    <div class="field">
                        <label>E-mail</label>
                        <input id="reg-email" type="email" placeholder="joao@email.com">
                    </div>
                    <div class="field">
                        <label>Username</label>
                        <input id="reg-username" type="text" placeholder="joao.silva">
                    </div>
                    <div class="field">
                        <label>Senha</label>
                        <input id="reg-password" type="password" placeholder="mínimo 6 caracteres">
                    </div>
                    <div class="field">
                        <label>Nível de inglês</label>
                        <select id="reg-level">
                            <option value="Beginner">Beginner</option>
                            <option value="Pre-Intermediate">Pre-Intermediate</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Business English">Business English</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-register">Criar Conta</button>
                </form>

            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
