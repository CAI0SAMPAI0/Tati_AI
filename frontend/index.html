<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati AI — Login</title>
    <link rel="icon" type="image/x-icon" href="images/tati_logo.jpg">
    <meta name="google-client-id" content="237918390149-balpj4nkb7frb0ujojnhkqcs930anh1i.apps.googleusercontent.com">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">

    <style>
        .google-btn-container {
            position: relative;
            width: 100%;
            margin-bottom: 1rem;
        }
        .btn-google {
            width: 100%;
            padding: 0.7rem;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.2s;
            pointer-events: none;
        }
        #google-btn-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 9px;
            opacity: 0.001;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #google-btn-wrap>div, #google-btn-wrap iframe {
            width: 100% !important;
            height: 100% !important;
        }

        /* Password eye button inside input */
        .pw-field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pw-field-wrap input {
            padding-right: 2.75rem !important;
            width: 100%;
        }
        .btn-pw-eye {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            transition: color 0.15s;
        }
        .btn-pw-eye:hover { color: var(--primary); }
    </style>
</head>

<body>
    <div class="login-page">
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">☀️</span>
        </button>

        <!-- ── Lado esquerdo ── -->
        <div class="login-left">
            <div class="login-left-content">
                <img src="images/tati_logo.jpg" alt="Teacher Tati" class="login-avatar"
                    onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
                <div id="avatar-fallback" class="login-avatar-fallback" style="display:none;">🧑‍🏫</div>
                <h1>Teacher Tati</h1>
                <p>Sua professora de inglês com inteligência artificial. Pratique quando quiser, no seu ritmo.</p>
                <div class="login-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- ── Lado direito ── -->
        <div class="login-right">
            <div class="login-form-wrap">

                <h2 data-i18n="auth.welcome">Bem-vindo</h2>
                <p class="subtitle" data-i18n="auth.subtitle">Entre na sua conta ou crie uma nova</p>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                        <span data-i18n="auth.tab_login">Entrar</span>
                    </button>
                    <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                        <span data-i18n="auth.tab_register">Criar Conta</span>
                    </button>
                </div>

                <div class="error-msg" id="error-msg"></div>
                <div class="success-msg" id="success-msg"></div>

                <!-- Google -->
                <div class="google-btn-container">
                    <button class="btn-google" tabindex="-1" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span data-i18n="auth.btn_google">Continuar com Google</span>
                    </button>
                    <div id="google-btn-wrap"></div>
                </div>

                <div class="divider"><span data-i18n="auth.or">ou</span></div>

                <!-- Form Login -->
                <form id="form-login" onsubmit="handleLogin(event)">
                    <div class="field">
                        <label data-i18n="auth.username_email">Username ou E-mail</label>
                        <input id="login-username" type="text"
                               data-i18n-placeholder="auth.username_email"
                               placeholder="usuario ou email@exemplo.com"
                               autocomplete="username">
                    </div>
                    <div class="field">
                        <label data-i18n="auth.password">Senha</label>
                        <div class="pw-field-wrap">
                            <input id="login-password" type="password" placeholder="••••••••"
                                   autocomplete="current-password">
                            <button type="button" class="btn-pw-eye" onclick="togglePw('login-password', this)" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">
                        <span data-i18n="auth.btn_login">Entrar</span>
                    </button>
                </form>

                <!-- Form Cadastro -->
                <form id="form-register" style="display:none;" onsubmit="handleRegister(event)">
                    <div class="field">
                        <label data-i18n="auth.name">Nome completo</label>
                        <input id="reg-name" type="text" placeholder="João Silva">
                    </div>
                    <div class="field">
                        <label data-i18n="auth.email">E-mail</label>
                        <input id="reg-email" type="email" placeholder="joao@email.com">
                    </div>
                    <div class="field">
                        <label data-i18n="auth.username">Username</label>
                        <input id="reg-username" type="text" placeholder="joao.silva">
                    </div>
                    <div class="field">
                        <label data-i18n="auth.password">Senha</label>
                        <div class="pw-field-wrap">
                            <input id="reg-password" type="password"
                                   data-i18n-placeholder="auth.err_password"
                                   placeholder="mínimo 6 caracteres">
                            <button type="button" class="btn-pw-eye" onclick="togglePw('reg-password', this)" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="field">
                        <label data-i18n="auth.level">Nível de inglês</label>
                        <select id="reg-level">
                            <option value="Beginner">Beginner</option>
                            <option value="Pre-Intermediate">Pre-Intermediate</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Business English">Business English</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-register">
                        <span data-i18n="auth.btn_register">Criar Conta</span>
                    </button>
                </form>

            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
