<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tati AI — Modo Voz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/voice.css">
  <link rel="stylesheet" href="styles/word_tooltip.css">
  <link rel="icon" type="image/x-icon" href="images/tati_logo.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

  <!-- Topbar -->
  <header class="voice-topbar">
    <div class="voice-topbar-left">
      <a href="chat.html" class="btn-back-chat" id="btn-back-chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        Chat
      </a>
      <span class="voice-title" id="voice-conv-title">Voice Mode</span>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <a href="settings.html" class="btn-back-chat" title="Configurações">
        <i class="fa-solid fa-gear"></i>
        </svg>
      </a>
    </div>
  </header>

  <!-- Body -->
  <div class="voice-body">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrap" id="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar-ring-2"></div>
        <img id="avatar-img" class="avatar-img" src="images/tati_logo.jpg" alt="Teacher Tati"
          onerror="this.style.display='none'; document.getElementById('avatar-emoji').style.display='flex';">
        <div id="avatar-emoji" class="avatar-emoji-fallback">🧑‍🏫</div>
      </div>
      <div class="prof-name">Teacher Tati</div>
      <div class="voice-status" id="voice-status">
        <span class="status-dot"></span>
        <span id="status-text">Online</span>
      </div>
    </div>

    <!-- Conversation bubbles -->
    <div class="voice-history" id="voice-history">
      <div class="vtyping" id="vtyping">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="voice-transcription" id="voice-transcription"></div>

    <!-- Footer -->
    <div class="voice-footer">
      <div class="voice-audio-bar">
        <button class="vac-btn" id="vac-play-btn">▶ Ouvir</button>
        <button class="vac-btn" id="vac-rewind-btn">↩ 5s</button>
        <div class="vac-sep"></div>
        <span class="vac-label">Vol</span>
        <input type="range" class="vac-range" id="vac-vol" min="0" max="1" step="0.05" value="1">
        <span class="vac-val" id="vac-vol-val">100%</span>
        <div class="vac-sep"></div>
        <span class="vac-label">Vel</span>
        <input type="range" class="vac-range" id="vac-spd" min="0.5" max="2" step="0.1" value="1">
        <span class="vac-val" id="vac-spd-val">1.0×</span>
      </div>

      <div class="mic-wrap">
        <button class="mic-btn" id="mic-btn">🎤</button>
        <span class="mic-hint" id="mic-hint">Toque para falar</span>
      </div>
    </div>

  </div>
  <script src="js/i18n.js"></script>
  <script src="js/word_tooltip.js"></script>
  <script src="js/api.js"></script>
  <script src="js/voice.js"></script>
</body>

</html>
