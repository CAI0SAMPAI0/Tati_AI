<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati AI — Meu Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/styles/profile.css">
    <link rel="icon" type="image/x-icon" href="/assets/images/tati_logo.jpg">
</head>

<body>
    <div class="profile-layout">

        <header class="profile-topbar">
            <a href="chat.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i>
                <span data-i18n="nav.back_chat">Voltar ao Chat</span>
            </a>
            <span class="topbar-brand">Teacher Tati</span>
            
        </header>

        <div class="profile-content">

            <!-- Hero -->
            <div class="profile-hero">
                <div class="profile-avatar-wrap">
                    <img id="profile-avatar-img" class="profile-avatar-photo" src="" alt="" style="display:none;"
                        onerror="this.style.display='none'; document.getElementById('profile-avatar').style.display='flex';">
                    <div class="profile-avatar" id="profile-avatar">??</div>
                    <div class="avatar-ring"></div>
                    <label class="avatar-upload-overlay" title="Trocar foto" for="avatar-file-input">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="avatar-file-input" accept="image/jpeg,image/png,image/webp"
                        style="display:none;" onchange="handleAvatarUpload(event)">
                </div>
                <div class="profile-hero-info">
                    <h1 id="profile-name" data-i18n="dash.loading">Carregando...</h1>
                    <p id="profile-username" class="profile-username">@username</p>
                    <div class="profile-badges">
                        <span class="badge badge-level" id="badge-level">Beginner</span>
                        <span class="badge badge-role" id="badge-role">Student</span>
                    </div>
                    <div id="avatar-upload-status" style="display:none;" class="avatar-status"></div>
                </div>
                <div class="profile-hero-actions" style="margin-left: auto;">
                    <a href="payment.html" class="btn-save" style="background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; text-decoration: none;">
                        <i class="fa-solid fa-crown"></i>
                        <span>Upgrade to Premium</span>
                    </a>
                </div>
            </div>

            <!-- Stats -->
            <div class="profile-stats" id="profile-stats">
                <div class="stat-card">
                    <div class="stat-value" id="stat-messages">—</div>
                    <div class="stat-label" data-i18n="profile.msgs">Mensagens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-conversations">—</div>
                    <div class="stat-label" data-i18n="profile.convs">Conversas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-days">—</div>
                    <div class="stat-label" data-i18n="profile.days">Dias ativo</div>
                </div>
            </div>

            <!-- Form -->
            <div class="profile-sections">

                <!-- Dados pessoais -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <i class="fa-solid fa-user"></i>
                        <span data-i18n="profile.personal">Informações Pessoais</span>
                    </h2>
                    <div class="form-grid">
                        <div class="field">
                            <label data-i18n="profile.full_name">Nome completo</label>
                            <input id="field-name" type="text" placeholder="Seu nome">
                        </div>
                        <div class="field">
                            <label data-i18n="profile.nickname">Apelido</label>
                            <input id="field-nickname" type="text" data-i18n-placeholder="profile.nickname_ph"
                                placeholder="Como prefere ser chamado">
                        </div>
                        <div class="field">
                            <label data-i18n="profile.email">E-mail</label>
                            <input id="field-email" type="email" placeholder="seu@email.com">
                        </div>
                        <div class="field">
                            <label data-i18n="profile.occupation">Profissão</label>
                            <input id="field-occupation" type="text" data-i18n-placeholder="profile.occupation_ph"
                                placeholder="Ex: Desenvolvedor, Estudante...">
                        </div>
                    </div>
                </section>

                <!-- Preferências de estudo -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <i class="fa-solid fa-star"></i>
                        <span data-i18n="profile.study">Preferências de Estudo</span>
                    </h2>
                    <div class="form-grid">
                        <div class="field">
                            <label data-i18n="profile.level">Nível de inglês</label>
                            <select id="field-level">
                                <option value="Beginner" data-i18n="level.beginner">Beginner</option>
                                <option value="Pre-Intermediate" data-i18n="level.pre_int">Pre-Intermediate</option>
                                <option value="Intermediate" data-i18n="level.intermediate">Intermediate</option>
                                <option value="Business English" data-i18n="level.business">Business English</option>
                                <option value="Advanced" data-i18n="level.advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="field">
                            <label data-i18n="profile.focus">Foco de aprendizado</label>
                            <select id="field-focus">
                                <option value="General Conversation" data-i18n="focus.general">General Conversation
                                </option>
                                <option value="Business English" data-i18n="focus.business">Business English</option>
                                <option value="Travel English" data-i18n="focus.travel">Travel English</option>
                                <option value="Academic English" data-i18n="focus.academic">Academic English</option>
                                <option value="Job Interviews" data-i18n="focus.interviews">Job Interviews</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- Segurança -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <i class="fa-solid fa-lock"></i>
                        <span data-i18n="profile.security">Segurança</span>
                    </h2>
                    <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;" data-i18n="settings.senha_nova">
                        
                    </p>
                    <div class="form-grid">
                        <div class="field">
                            <label data-i18n="profile.current_pw">Senha atual</label>
                            <div class="pw-input-wrap">
                                <input id="field-current-pw" type="password" placeholder="••••••••">
                                <button type="button" class="btn-pw-eye"
                                    onclick="togglePwVisibility('field-current-pw', this)" tabindex="-1">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <label data-i18n="profile.new_pw">Nova senha</label>
                            <div class="pw-input-wrap">
                                <input id="field-new-pw" type="password" data-i18n-placeholder="profile.new_pw_ph"
                                    placeholder="mínimo 6 caracteres">
                                <button type="button" class="btn-pw-eye"
                                    onclick="togglePwVisibility('field-new-pw', this)" tabindex="-1">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Botão único de salvar -->
                <div id="save-feedback" class="save-feedback" style="display:none;"></div>
                <button class="btn-save" id="btn-save" onclick="saveAll()" style="width:100%;justify-content:center;">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span data-i18n="profile.save">Salvar alterações</span>
                </button>

                <!-- Zona de perigo -->
                <section class="profile-section danger-zone">
                    <h2 class="section-title danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span data-i18n="profile.danger">Zona de Perigo</span>
                    </h2>
                    <p class="danger-desc" data-i18n="profile.danger_desc">Estas ações são irreversíveis. Prossiga com
                        cuidado.</p>
                    <button class="btn-danger" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span data-i18n="nav.logout">Sair da conta</span>
                    </button>
                </section>

            </div>
        </div>
    </div>

    <script src="/src/scripts/i18n.js"></script>
    <script src="/src/scripts/api.js"></script>
    <script src="/src/scripts/profile.js"></script>
</body>

</html>
