<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tati AI — Meu Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/profile.css">
</head>

<body>

    <div class="profile-layout">

        <!-- Topbar -->
        <header class="profile-topbar">
            <a href="chat.html" class="btn-back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 5l-7 7 7 7" />
                </svg>
                Voltar ao Chat
            </a>
            <span class="topbar-brand">Teacher Tati</span>
            <button class="theme-toggle-inline" onclick="toggleTheme()" title="Tema">
                <span id="theme-icon">☀️</span>
            </button>
        </header>

        <div class="profile-content">

            <!-- Card do avatar / header -->
            <div class="profile-hero">
                <div class="profile-avatar-wrap">
                    <div class="profile-avatar" id="profile-avatar">??</div>
                    <div class="avatar-ring"></div>
                </div>
                <div class="profile-hero-info">
                    <h1 id="profile-name">Carregando...</h1>
                    <p id="profile-username" class="profile-username">@username</p>
                    <div class="profile-badges">
                        <span class="badge badge-level" id="badge-level">Beginner</span>
                        <span class="badge badge-role" id="badge-role">Student</span>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="profile-stats" id="profile-stats">
                <div class="stat-card">
                    <div class="stat-value" id="stat-messages">—</div>
                    <div class="stat-label">Mensagens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-conversations">—</div>
                    <div class="stat-label">Conversas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-days">—</div>
                    <div class="stat-label">Dias ativo</div>
                </div>
            </div>

            <!-- Formulário de edição -->
            <div class="profile-sections">

                <!-- Info pessoal -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />
                        </svg>
                        Informações Pessoais
                    </h2>
                    <div class="form-grid">
                        <div class="field">
                            <label>Nome completo</label>
                            <input id="field-name" type="text" placeholder="Seu nome">
                        </div>
                        <div class="field">
                            <label>Apelido</label>
                            <input id="field-nickname" type="text" placeholder="Como prefere ser chamado">
                        </div>
                        <div class="field">
                            <label>E-mail</label>
                            <input id="field-email" type="email" placeholder="seu@email.com">
                        </div>
                        <div class="field">
                            <label>Profissão</label>
                            <input id="field-occupation" type="text" placeholder="Ex: Desenvolvedor, Estudante...">
                        </div>
                    </div>
                </section>

                <!-- Preferências de estudo -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                        Preferências de Estudo
                    </h2>
                    <div class="form-grid">
                        <div class="field">
                            <label>Nível de inglês</label>
                            <select id="field-level">
                                <option value="Beginner">Beginner</option>
                                <option value="Pre-Intermediate">Pre-Intermediate</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Business English">Business English</option>
                                <option value="Advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Foco de aprendizado</label>
                            <select id="field-focus">
                                <option value="General Conversation">General Conversation</option>
                                <option value="Business English">Business English</option>
                                <option value="Travel English">Travel English</option>
                                <option value="Academic English">Academic English</option>
                                <option value="Job Interviews">Job Interviews</option>
                            </select>
                        </div>
                    </div>
                    <div id="save-feedback" class="save-feedback" style="display:none;"></div>
                    <button class="btn-save" id="btn-save" onclick="saveProfile()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Salvar alterações
                    </button>
                </section>

                <!-- Segurança -->
                <section class="profile-section">
                    <h2 class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        Segurança
                    </h2>
                    <div class="form-grid">
                        <div class="field">
                            <label>Senha atual</label>
                            <input id="field-current-pw" type="password" placeholder="••••••••">
                        </div>
                        <div class="field">
                            <label>Nova senha</label>
                            <input id="field-new-pw" type="password" placeholder="mínimo 6 caracteres">
                        </div>
                    </div>
                    <div id="pw-feedback" class="save-feedback" style="display:none;"></div>
                    <button class="btn-save btn-save-secondary" id="btn-pw" onclick="changePassword()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                        Atualizar senha
                    </button>
                </section>

                <!-- Zona de perigo -->
                <section class="profile-section danger-zone">
                    <h2 class="section-title danger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                            <line x1="12" y1="9" x2="12" y2="13" />
                            <line x1="12" y1="17" x2="12.01" y2="17" />
                        </svg>
                        Zona de Perigo
                    </h2>
                    <p class="danger-desc">Estas ações são irreversíveis. Prossiga com cuidado.</p>
                    <button class="btn-danger" onclick="logout()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                        </svg>
                        Sair da conta
                    </button>
                </section>

            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>

</html>
